_schema-version: "3.2"
ID: com.jcystec.apicopeinca.service.qas
extends: com.jcystec.apicopeinca.service

modules:

  # ---------------- BACKEND ----------------
  - name: api-copeinca-service
    properties:
      SPRING_PROFILES_ACTIVE: qas
      COM_INNOVAX_ISLOCAL: false
    parameters:
      app-name: api-copeinca-service-qas
      instances: 1
      memory: 3072M
      routes:
        - route: copeinca-qas-backend.${default-domain}

  # ---------------- APP ROUTER ----------------
  - name: api-copeinca-service-router
    parameters:
      app-name: api-copeinca-service-router-qas
      instances: 1
      memory: 1024M
      routes:
        - route: copeinca-qas-router.${default-domain}

resources:

  # ---------------- XSUAA ----------------
  - name: api-copeinca-service-xsuaa-service
    parameters:
      config:
        xsappname: api-copeinca-service-qas

  # ---------------- DESTINATION ----------------
  - name: api-copeinca-service-destination-service
    parameters:
      service-name: api-copeinca-service-destination-qas