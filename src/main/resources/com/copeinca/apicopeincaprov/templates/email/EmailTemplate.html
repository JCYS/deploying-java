<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
</head>
<body
        style="
      width: 600px;
      margin: auto;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      color: #333;
    "
>
<!-- gold bar -->
<table
        cellspacing="0"
        cellpadding="0"
        width="600px"
        class="header"
        style="
        border-bottom-style: solid;
        border-bottom-color: #f0ab00;
        border-bottom-width: 8px;
        padding-top: 13px;
        padding-bottom: 12px;
      "
>
    <tr
            style="border-collapse: collapse; width: 600px; padding: 0; margin: 0"
    >
        <td
                style="border-collapse: collapse; width: 600px; padding: 0; margin: 0"
        >
            <table cellspacing="0" cellpadding="0">
                <tr
                        style="
                border-collapse: collapse;
                width: 600px;
                padding: 0;
                margin: 0;
              "
                >
                    <td
                            class="logo"
                            style="
                  border-collapse: collapse;
                  width: 61px;
                  padding: 0;
                  margin: 0;
                "
                    >
                        <img
                                src="${URL_LOGO}"
                                width="100"
                                height="100"
                                style="
                    border: 1px black;
                    height: auto;
                    line-height: 100%;
                    outline: none;
                    text-decoration: none;
                  "
                        />
                    </td>
                </tr>
            </table>
        </td>
        
    </tr>
</table>
<table cellspacing="0" cellpadding="0" width="600px">
    <tr
            style="border-collapse: collapse; width: 600px; padding: 0; margin: 0"
    >
        <td
                class="main_first"
                style="
            border-collapse: collapse;
            width: 600px;
            padding: 0;
            margin: 0;
            padding-top: 36px;
            padding-bottom: 12px;
          "
        >
            ${CONTENT}
        </td>
    </tr>
</table>
</body>
</html>
