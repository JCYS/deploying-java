_schema-version: "3.2"
ID: com.jcystec.apicopeinca.service.prd
extends: com.jcystec.apicopeinca.service

modules:

  # ---------------- BACKEND ----------------
  - name: api-copeinca-service
    properties:
      SPRING_PROFILES_ACTIVE: prd
      COM_INNOVAX_ISLOCAL: false
    parameters:
      app-name: api-copeinca-service-prd
      instances: 1
      memory: 2096M
      routes:
        - route: copeinca-prd-backend.${default-domain}

  # ---------------- APP ROUTER ----------------
  - name: api-copeinca-service-router
    parameters:
      app-name: api-copeinca-service-router-prd
      instances: 1
      memory: 1024M
      routes:
        - route: copeinca-prd-router.${default-domain}

resources:

  # ---------------- XSUAA ----------------
  - name: api-copeinca-service-xsuaa-service
    parameters:
      config:
        xsappname: api-copeinca-service-prd

  # ---------------- DESTINATION ----------------
  - name: api-copeinca-service-destination-service
    parameters:
      service-name: api-copeinca-service-destination-prd